name: Grain ci cd

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: install dependencies
        run: npm install
      - name: deploy
        run: echo "deploying..."
